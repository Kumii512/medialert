<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="medialert_project">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>medialert_project</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f1f8f5;
      font-family: Arial, sans-serif;
    }

    #app-loading {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #2c3e50;
    }

    #app-loading .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid #d7e9df;
      border-top-color: #6ba587;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="app-loading">
    <div class="spinner"></div>
    <div>Loading MediAlert...</div>
  </div>
  <script>
    (async function clearStaleFlutterCaches() {
      const resetKey = 'medialert-sw-reset-v1';
      if (sessionStorage.getItem(resetKey) || !('serviceWorker' in navigator) || !('caches' in window)) {
        return;
      }

      sessionStorage.setItem(resetKey, 'started');

      try {
        const registrations = await navigator.serviceWorker.getRegistrations();
        if (!registrations.length) {
          sessionStorage.setItem(resetKey, 'skipped');
          return;
        }

        await Promise.all(registrations.map((registration) => registration.unregister()));

        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map((cacheName) => caches.delete(cacheName)));

        sessionStorage.setItem(resetKey, 'done');
        location.reload();
      } catch (_) {
        sessionStorage.setItem(resetKey, 'failed');
      }
    })();
  </script>
  <script>
    (function patchAssetManifestFetch() {
      const originalFetch = window.fetch.bind(window);
      window.fetch = function (resource, init) {
        const url = typeof resource === 'string' ? resource : resource?.url;
        if (url && /\/assets\/AssetManifest\.json(\?|$)/.test(url)) {
          const remappedUrl = url.replace('AssetManifest.json', 'AssetManifest.bin.json');
          return originalFetch(remappedUrl, init);
        }
        return originalFetch(resource, init);
      };
    })();
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    function showStartupError(message) {
      const loading = document.getElementById('app-loading');
      if (!loading) return;
      loading.innerHTML = '<div style="max-width:520px;padding:16px;text-align:center;color:#b00020;font-size:14px;line-height:1.4;">' +
        'MediAlert failed to start.<br/>' +
        message +
        '<br/><br/>Please refresh or open in an incognito window.' +
        '</div>';
    }

    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('app-loading');
      if (loading) {
        loading.remove();
      }
    });

    window.addEventListener('error', function (event) {
      const text = event && event.message ? event.message : 'Unknown startup error';
      showStartupError(text);
    });

    window.addEventListener('unhandledrejection', function (event) {
      const reason = event && event.reason ? String(event.reason) : 'Unhandled promise rejection';
      showStartupError(reason);
    });
  </script>
</body>
</html>
